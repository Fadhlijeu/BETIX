<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BE TIX - Masuk</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(circle at top right, var(--navy-light), var(--navy));
    }
    .auth-card {
      background: var(--surface);
      width: 100%;
      max-width: 400px;
      padding: 40px 30px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .auth-logo {
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: -1px;
    }
    .auth-logo span { color: var(--red); }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: var(--navy-mid);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      transition: border-color 0.3s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--red);
    }
    .btn-auth {
      width: 100%;
      background: var(--red);
      color: white;
      border: none;
      padding: 16px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }
    .btn-auth:hover { background: var(--red-dark); }
    .auth-footer {
      text-align: center;
      margin-top: 25px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .auth-footer a {
      color: var(--red);
      text-decoration: none;
      font-weight: 600;
    }
    .error-msg {
      background: rgba(230, 57, 70, 0.1);
      color: var(--red);
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">BE<span>TIX</span></div>
    
    <div id="error-box" class="error-msg">Email atau password salah.</div>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-input" placeholder="Masukkan email Anda" required>
      </div>
      <div class="form-group">
        <label>Kata Sandi</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-auth">Masuk Sekarang</button>
    </form>

    <div class="auth-footer">
      Belum punya akun? <a href="/register.html">Daftar Gratis</a>
    </div>
  </div>
</div>

<script>
  const SESSION_KEY = 'user_session';
  const loginForm = document.getElementById('login-form');
  const errorBox = document.getElementById('error-box');

  function safeParse(raw) {
    try {
      return raw ? JSON.parse(raw) : null;
    } catch {
      return null;
    }
  }

  function normalizeUser(user) {
    if (!user || typeof user !== 'object') return null;
    return {
      ...user,
      role: String(user.role || 'user').toLowerCase(),
      name: user.name || user.nama || user.username || '',
      email: user.email || ''
    };
  }

  function redirectByRole(user) {
    const role = String(user?.role || 'user').toLowerCase();
    if (role === 'admin') {
      window.location.assign('/admin.html');
      return;
    }
    window.location.assign('/index.html');
  }

  const existing = normalizeUser(safeParse(localStorage.getItem(SESSION_KEY)));
  if (existing) {
    redirectByRole(existing);
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        errorBox.textContent = data.message || 'Login gagal. Silakan coba lagi.';
        errorBox.style.display = 'block';
        return;
      }

      const user = normalizeUser(data.user);
      localStorage.setItem(SESSION_KEY, JSON.stringify(user));
      redirectByRole(user);
    } catch (err) {
      errorBox.textContent = 'Terjadi kesalahan koneksi ke server.';
      errorBox.style.display = 'block';
    }
  });
</script>

</body>
</html>
