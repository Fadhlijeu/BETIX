<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BETIX - Masuk</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/login.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">BE<span>TIX</span></div>
    
    <div id="error-box" class="error-msg">Email atau password salah.</div>

    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-input" placeholder="Masukkan email Anda" required>
      </div>
      <div class="form-group">
        <label>Kata Sandi</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-auth">Masuk Sekarang</button>
    </form>

    <div class="auth-footer">
      Belum punya akun? <a href="/register.html">Daftar Gratis</a>
    </div>
  </div>
</div>

<script>
  const SESSION_KEY = 'user_session';
  const loginForm = document.getElementById('login-form');
  const errorBox = document.getElementById('error-box');

  function safeParse(raw) {
    try {
      return raw ? JSON.parse(raw) : null;
    } catch {
      return null;
    }
  }

  function normalizeUser(user) {
    if (!user || typeof user !== 'object') return null;
    return {
      ...user,
      role: String(user.role || 'user').toLowerCase(),
      name: user.name || user.nama || user.username || '',
      email: user.email || ''
    };
  }

  function redirectByRole(user) {
    const role = String(user?.role || 'user').toLowerCase();
    if (role === 'admin') {
      window.location.assign('/admin.html');
      return;
    }
    window.location.assign('/index.html');
  }

  const existing = normalizeUser(safeParse(localStorage.getItem(SESSION_KEY)));
  if (existing) {
    redirectByRole(existing);
  }

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        errorBox.textContent = data.message || 'Login gagal. Silakan coba lagi.';
        errorBox.style.display = 'block';
        return;
      }

      const user = normalizeUser(data.user);
      localStorage.setItem(SESSION_KEY, JSON.stringify(user));
      redirectByRole(user);
    } catch (err) {
      errorBox.textContent = 'Terjadi kesalahan koneksi ke server.';
      errorBox.style.display = 'block';
    }
  });
</script>

</body>
</html>
